name: "Build"

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Test
        run: ./gradlew test



  build:
    runs-on: ubuntu-latest
    needs: test  # 只有 test job 成功后才执行
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build All Modules
        run: ./gradlew build

      - name: Build Fat Jar (Core Only)
        run: ./gradlew :core:shadowjar

      - name: Collect Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Http-Driver
          path: |
            core/build/libs/*.jar
            api/build/libs/*.jar