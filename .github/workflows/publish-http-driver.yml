name: "Publish Kokoroid"

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  test:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Setup JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Test
        run: ./gradlew test

  publish-core-to-release:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '18'
      - name: Setup JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build Core
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew clean :core:build :core:shadowJar -Pversion="$VERSION"
      - name: Create Release with changelogits
        run: npx changelogits --repo-provider github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: core/build/libs/*.jar
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-maven-central:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Get version from tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Setup JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Publish to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew publishAggregationToCentralPortal -Pversion="$VERSION"
